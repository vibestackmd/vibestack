# Copy this to .github/workflows/ci.yml in your Go project
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality-gate:
    uses: vibestackmd/shared-ci-guards/.github/workflows/ci-go.yml@main
    with:
      go-version: "1.22"
      coverage-threshold: 75
      # mutation-enabled: true
      # mutation-score: 60
      # working-directory: "."
      # enable-ai-feedback: true
    secrets: inherit
