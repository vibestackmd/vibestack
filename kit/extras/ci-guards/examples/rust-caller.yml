# Copy this to .github/workflows/ci.yml in your Rust project
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality-gate:
    uses: vibestackmd/shared-ci-guards/.github/workflows/ci-rust.yml@main
    with:
      rust-version: "stable"
      coverage-threshold: 75
      # mutation-enabled: true
      # mutation-score: 60
      # working-directory: "."
      # enable-ai-feedback: true
    secrets: inherit
